<!-- Contact Section -->
<section id="contact" class="container py-5">
  <h2 class="mb-3">Get In Touch</h2>

  <div class="contact-content">
    <p class="mb-4">
      I'm always interested in hearing about new opportunities and interesting projects. Let's connect!
    </p>

    <form class="contact-form" action="/contact" method="POST">

      <input type="text" name="name" placeholder="Your Name"class="form-control mb-3" required>

      <input type="email" name="email" placeholder="Your Email"class="form-control mb-3" required>

      <input type="text" name="subject" placeholder="Subject"class="form-control mb-3" required>

      <textarea name="message" rows="5" placeholder="Your Message" class="form-control mb-3" required></textarea>

      <button type="submit" class="btn btn-primary">Send Message</button>

    </form>

    <!-- Social Links -->

      <a href="mailto:margobonal11010@gmail.com">Email</a>
    </div>

  </div>
