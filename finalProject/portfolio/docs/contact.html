<!DOCTYPE html>
<html lang="en">
  <!--Resource: https://getbootstrap.com/docs/4.0/components/forms/-->
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>Contact Form</title>
  </head>

  <body>
    <div class="container">
      <form action="#">
        <fieldset>
          <legend>Contact Information</legend>

          <div class="row">
            <!-- Name -->
            <div class="col-12 col-md-6 mb-3">
              <label for="name" class="form-label">Name:</label>
              <input type="text" id="name" name="user_name" class="form-control" required>
            </div>

            <!-- Email -->
            <div class="col-12 col-md-6 mb-3">
              <label for="mail" class="form-label">Email:</label>
              <input type="email" id="mail" name="user_mail" class="form-control" required>
            </div>

            <!-- Phone -->
            <div class="col-12 col-md-6 mb-3">
              <label for="phone" class="form-label">Phone #:</label>
              <input type="number" id="phone" name="user_phone" class="form-control" required>
            </div>

            <!-- Subject -->
            <div class="col-12 col-md-6 mb-3">
              <label for="subject" class="form-label">Subject:</label>
              <input type="text" id="subject" name="user_subject" class="form-control" required>
            </div>

            <!-- Message -->
            <div class="col-12 mb-3">
              <label for="msg" class="form-label">Message:</label>
              <textarea id="msg" name="user_msg" class="form-control" rows="4"></textarea>
            </div>
          </div>

          <!-- Buttons -->
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">Submit</button>
            <button type="reset" class="btn btn-secondary">Reset</button>
            <button type="button" class="btn btn-outline-dark" onclick="window.location.href='index.html'">
              Return To Home
            </button>
          </div>
        </fieldset>
      </form>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>


<!-- Contact Section -->

                <button type="submit">Send Message</button>
