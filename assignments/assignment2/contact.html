<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Contact Form</title>
  </head>

  <body>
    <form action="#"> <!--prevent unsafe submit-->
        <fieldset>
            <legend>Contact Information</legend>
            <label for="name" >Name:</label>
            <input type="text" id="name" name="user_name" placeholder="" required>

            <label for="mail" >Email:</label>
            <input type="email" id="mail" name="user_mail" placeholder="" required>
      
            <label for="phone">Phone #:</label>
            <input type="number" id="phone" name="user_phone" placeholder="" required>
         
            <label for="subject">Subject:</label>
            <input type="text" id="subject" name="user_subject" placeholder="" required>

            <label for="msg">Message:</label>
            <textarea id="msg" name="user_msg"></textarea>

            <button type="submit">Submit</button>
            <button type="reset">Reset</button>
            
            <button type="button" onclick="window.location.href='index.html'">Return To Home</button>
        </fieldset>

    </form>

  </body>

</html>
